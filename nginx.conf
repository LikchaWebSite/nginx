proxy_cache_path /data/nginx/cache levels=1:2 keys_zone=STATIC:10m inactive=48h max_size=1g;

server {
  listen 80;

  server_name _;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name ~^(?!www\.)(?<bare_domain>.+)$;
  
  return 301 https://www.$bare_domain$request_uri;
}


server {
  listen 443 ssl;

  server_name www.angels-shop.ru;

  ssl_certificate /etc/ssl/private/live/$server_name/fullchain.pem;
  ssl_certificate_key /etc/ssl/private/live/$server_name/privkey.pem;

  ssl_stapling on;
  ssl_stapling_verify on;
  ssl_prefer_server_ciphers on;
  ssl_session_tickets off;
  ssl_session_timeout 10m;
  ssl_ecdh_curve secp384r1;
  ssl_session_cache shared:SSL:10m;
  
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-Content-Type-Options nosniff;
  add_header X-XSS-Protection "1; mode=block";
  
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_min_length 256;
  gzip_disable "msie6";
  gzip_http_version 1.1;
  gzip_types
      application/atom+xml
      application/geo+json
      application/javascript
      application/json
      text/css
      text/plain;
  
  client_body_buffer_size 10K;
  client_header_buffer_size 1k;
  client_max_body_size 8m;
  large_client_header_buffers 2 1k;
  client_body_timeout 12s;
  client_header_timeout 12s;
  keepalive_timeout 15s;
  send_timeout 10s;

  access_log off;
}

server {
  listen 443 ssl;
  server_name www.volokut.ru;
  
  ssl_certificate /etc/ssl/private/live/$server_name/fullchain.pem;
  ssl_certificate_key /etc/ssl/private/live/$server_name/privkey.pem;
  
  ssl_stapling on;
  ssl_stapling_verify on;
  ssl_prefer_server_ciphers on;
  ssl_session_tickets off;
  ssl_session_timeout 10m;
  ssl_ecdh_curve secp384r1;
  ssl_session_cache shared:SSL:10m;
  
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-Content-Type-Options nosniff;
  add_header X-XSS-Protection "1; mode=block";
  
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_min_length 256;
  gzip_disable "msie6";
  gzip_http_version 1.1;
  gzip_types
      application/atom+xml
      application/geo+json
      application/javascript
      application/json
      text/css
      text/plain;
  
  client_body_buffer_size 10K;
  client_header_buffer_size 1k;
  client_max_body_size 8m;
  large_client_header_buffers 2 1k;
  client_body_timeout 12s;
  client_header_timeout 12s;
  keepalive_timeout 15s;
  send_timeout 10s;

  access_log off;

  location / {
    proxy_pass http://fe-app:3000;

    add_header X-Cache-Status $upstream_cache_status;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-NginX-Proxy true;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Host $http_host;
    proxy_cache_bypass $http_upgrade;
    proxy_ssl_session_reuse off;
    proxy_redirect off;
    proxy_buffering on;
    proxy_cache STATIC;
    proxy_cache_valid 200 1d;
    proxy_cache_valid any 1m;
    proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
  }

  location /hooks/ {
    proxy_pass http://webhook:9000/hooks/;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-NginX-Proxy true;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Host $http_host;
    proxy_cache_bypass $http_upgrade;
    proxy_ssl_session_reuse off;
    proxy_redirect off;
  }
}
